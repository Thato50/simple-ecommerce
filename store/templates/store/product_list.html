<h1>Products</h1>

{% for product in products %}
<div>

<a href="/product/{{ product.id }}/">
    <h2>{{ product.name }}</h2>
</a>

{% if product.image %}
<img src="{{ product.image.url }}" width="200">
{% endif %}

<p>Price: R{{ product.price }}</p>
<p>{{ product.description }}</p>

</div>
<hr>
{% endfor %}
