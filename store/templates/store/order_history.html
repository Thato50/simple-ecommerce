<h2>My Orders</h2>

{% for order in orders %}

    <h3>Order #{{ order.id }}</h3>

    <ul>
        {% for item in order.orderitem_set.all %}
            <li>
                {{ item.product.name }} 
                (Qty: {{ item.quantity }}) 
                - R{{ item.get_total }}
            </li>
        {% endfor %}
    </ul>

    <p><strong>Total: R{{ order.get_cart_total }}</strong></p>

    <hr>

{% empty %}

<p>You have no past orders.</p>

{% endfor %}
